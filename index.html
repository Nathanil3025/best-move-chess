<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Chess Analyzer</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #4CAF50; margin-bottom: 5px; }
        p.subtitle { color: #aaaaaa; margin-bottom: 20px; }
        
        .container {
            display: flex;
            gap: 30px;
            background: #2a2a2a;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        /* --- LAYOUT BARU UNTUK BAR EVALUASI --- */
        .board-wrapper {
            display: flex;
            gap: 15px;
            align-items: stretch;
        }

        .eval-bar-container {
            width: 25px;
            background-color: #333; /* Background Hitam */
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Membangun bar dari bawah (Putih) */
            position: relative;
            border: 2px solid #1e1e1e;
        }

        .eval-fill {
            width: 100%;
            background-color: #f3f3f3; /* Fill Putih */
            height: 50%; /* Posisi Seimbang 0.0 */
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .eval-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 11px;
            font-weight: 800;
            z-index: 10;
            transition: all 0.3s ease;
        }
        /* -------------------------------------- */
        
        #myBoard {
            width: 400px;
            flex-shrink: 0;
        }
        
        .panel {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-width: 300px;
            max-width: 450px;
        }
        
        .status-box {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #4CAF50;
        }
        
        #status { font-weight: bold; font-size: 1.1em; color: #fff;}
        
        #pgn { 
            font-family: monospace; color: #888; font-size: 0.9em; 
            margin-top: 10px; word-wrap: break-word;
        }
        
        .controls {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        
        button {
            background-color: #333; color: white; border: 1px solid #444;
            padding: 10px; border-radius: 6px; cursor: pointer;
            font-weight: bold; transition: all 0.2s;
        }
        
        button:hover { background-color: #4CAF50; border-color: #4CAF50; }
        .btn-analyze { grid-column: span 2; background-color: #4CAF50; color: #1a1a1a; border: none; padding: 15px; font-size: 1.1em;}
        .btn-analyze:hover { background-color: #45a049; }

        .toggle-container {
            grid-column: span 2;
            background-color: #3a3a3a;
            padding: 12px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            gap: 15px; font-size: 1.05em; border: 1px solid #555; cursor: pointer;
        }
        .toggle-container input { width: 18px; height: 18px; cursor: pointer; }

        .highlight-move { background-color: rgba(255, 255, 51, 0.5) !important; }
    </style>
</head>
<body>

    <h1>NextGen Chess Analyzer</h1>
    <p class="subtitle">Realtime Evaluation Bar & Stockfish 13</p>

    <div class="container">
        
        <!-- Papan & Bar Evaluasi -->
        <div class="board-wrapper">
            <!-- Indikator Eval Bar -->
            <div id="evalBar" class="eval-bar-container">
                <div id="evalText" class="eval-text">0.0</div>
                <div id="evalFill" class="eval-fill"></div>
            </div>
            
            <div id="myBoard"></div>
        </div>

        <div class="panel">
            <div class="status-box">
                <div>Status: <span id="status">Menyiapkan AI...</span></div>
                <div id="pgn"></div>
            </div>

            <div class="controls">
                <button id="startBtn">Reset Posisi</button>
                <button id="flipBtn">Putar Papan</button>
                <button id="undoBtn">Tarik Langkah</button>
                <button id="clearBtn">Kosongkan Papan</button>
                
                <label class="toggle-container">
                    <input type="checkbox" id="autoAiCheck"> 
                    Main Otomatis Lawan AI
                </label>

                <button id="analyzeBtn" class="btn-analyze">Tanya AI: Langkah Terbaik?</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var $pgn = $('#pgn');

        function removeHighlights () {
            $('#myBoard .highlight-move').removeClass('highlight-move');
        }

        function highlightLastMove (source, target) {
            removeHighlights();
            $('#myBoard .square-' + source).addClass('highlight-move');
            $('#myBoard .square-' + target).addClass('highlight-move');
        }

        // FUNGSI BARU: Mengatur Tinggi & Teks Eval Bar
        function updateEvalBar(evalScore, mate) {
            var percent = 50;
            var text = "0.0";

            if (mate !== null && mate !== undefined && mate !== "") {
                // Jika ada status Skakmat Pasti (M1, M2, dst)
                var mateNum = parseInt(mate);
                if (mateNum > 0) {
                    percent = 100; text = "M" + mateNum; // Putih Menang
                } else {
                    percent = 0; text = "-M" + Math.abs(mateNum); // Hitam Menang
                }
            } else {
                // Kalkulasi keunggulan poin standar
                var score = parseFloat(evalScore);
                if (isNaN(score)) score = 0;

                // Membatasi poin visual di -10 sampai +10
                var visualScore = Math.max(-10, Math.min(10, score));
                
                // Konversi skor ke persentase bar (Setiap 1 poin menggerakkan bar 5%)
                percent = 50 + (visualScore * 5);
                
                text = score > 0 ? "+" + score.toFixed(1) : score.toFixed(1);
            }

            $('#evalFill').css('height', percent + '%');

            var $evalText = $('#evalText');
            $evalText.text(text);

            // Geser posisi teks agar tidak tertutup warna background yang sama
            if (percent > 50) {
                // Putih mendominasi, teks turun ke area putih (font gelap)
                $evalText.css({ 'bottom': '5px', 'top': 'auto', 'color': '#222' });
            } else {
                // Hitam mendominasi, teks naik ke area hitam (font terang)
                $evalText.css({ 'top': '5px', 'bottom': 'auto', 'color': '#ddd' });
            }
        }

        // FUNGSI INTI: Analisis Posisi (Bisa Jalan AI, Bisa Sekadar Cek Bar Saja)
        function fetchAnalysis(makeAiMove) {
            if (game.game_over()) return;
            
            $status.html('Stockfish sedang mengevaluasi...');
            var currentFen = game.fen();
            
            $.ajax({
                url: 'https://stockfish.online/api/s/v2.php',
                type: 'GET',
                data: { fen: currentFen, depth: 13 },
                success: function(response) {
                    if(response.success) {
                        // 1. Update Bar Realtime!
                        updateEvalBar(response.evaluation, response.mate);
                        updateStatus();

                        // 2. Eksekusi Langkah AI JIKA Diperlukan
                        if (makeAiMove && response.bestmove) {
                            var bestMoveUCI = response.bestmove.split(' ')[1];
                            var moveObj = game.move(bestMoveUCI, {sloppy: true});
                            board.position(game.fen());
                            highlightLastMove(moveObj.from, moveObj.to);
                            
                            // Setelah AI jalan, cek bar evaluasi sekali lagi untuk posisi terbaru
                            fetchAnalysis(false); 
                        }
                    } else {
                        $status.html('Waduh, API sedang sibuk.');
                    }
                },
                error: function() {
                    $status.html('Gagal terhubung ke server Stockfish.');
                }
            });
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });
            if (move === null) return 'snapback';
            
            highlightLastMove(source, target);
            updateStatus();
        }

        function onSnapEnd () {
            board.position(game.fen());
            
            if ($('#autoAiCheck').is(':checked') && !game.game_over()) {
                // Jalankan langkah AI (otomatis mengupdate bar juga)
                fetchAnalysis(true);
            } else if (!game.game_over()) {
                // Jika Auto AI mati, cukup update Bar Evaluasinya saja saat pemain melangkah!
                fetchAnalysis(false);
            }
        }

        function updateStatus () {
            var statusHTML = '';
            var moveColor = (game.turn() === 'w') ? 'Putih' : 'Hitam';

            if (game.in_checkmate()) {
                statusHTML = 'Game over, ' + moveColor + ' skakmat.';
            } else if (game.in_draw()) {
                statusHTML = 'Game over, posisi remis.';
            } else {
                statusHTML = 'Giliran ' + moveColor + ' melangkah.';
                if (game.in_check()) {
                    statusHTML += ' (SKAK!)';
                }
            }
            $status.html(statusHTML);
            $pgn.html(game.pgn());
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        
        board = Chessboard('myBoard', config);
        updateStatus();

        // Panggil evaluasi awal saat web pertama kali dibuka
        $(document).ready(function() {
            fetchAnalysis(false);
        });

        $('#startBtn').on('click', function() { game.reset(); board.start(); removeHighlights(); fetchAnalysis(false); });
        $('#clearBtn').on('click', function() { game.clear(); board.clear(); removeHighlights(); updateEvalBar(0, null); updateStatus(); });
        $('#flipBtn').on('click', board.flip);
        $('#undoBtn').on('click', function() { 
            game.undo(); 
            if ($('#autoAiCheck').is(':checked')) { game.undo(); }
            board.position(game.fen()); 
            removeHighlights(); 
            fetchAnalysis(false); // Update bar setelah undo
        });

        $('#analyzeBtn').on('click', function() {
            if (game.game_over()) { alert("Permainan sudah berakhir!"); return; }
            fetchAnalysis(true);
        });

    </script>
</body>
</html>
